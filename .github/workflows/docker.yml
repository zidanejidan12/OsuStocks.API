name: Docker Build

on:
  pull_request:
    paths:
      - 'src/**'
      - 'docker-compose.yml'
      - 'src/Api/Dockerfile'
      - 'src/Worker/Dockerfile'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docker-compose.yml'
      - 'src/Api/Dockerfile'
      - 'src/Worker/Dockerfile'

jobs:
  build-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Api/Dockerfile
          push: false
          tags: osustocks-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Worker/Dockerfile
          push: false
          tags: osustocks-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
