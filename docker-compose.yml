services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: osu_stocks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-osu_stocks_dev}
      POSTGRES_DB: osu_stocks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osu_stocks"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=osu_stocks;Username=osu_stocks;Password=${POSTGRES_PASSWORD:-osu_stocks_dev}"
      ConnectionStrings__Redis: "redis:6379"
      OsuOAuth__ClientId: ${OSUOAUTH_CLIENT_ID}
      OsuOAuth__ClientSecret: ${OSUOAUTH_CLIENT_SECRET}
      OsuOAuth__RedirectUri: ${OSUOAUTH_REDIRECT_URI}
      Jwt__Issuer: ${JWT_ISSUER:-osu-stocks}
      Jwt__Audience: ${JWT_AUDIENCE:-osu-stocks-client}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN:-https://app.osustocks.example}
      Security__OAuthReturnUrl__AllowedOrigins__0: ${CORS_ORIGIN:-https://app.osustocks.example}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: src/Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=osu_stocks;Username=osu_stocks;Password=${POSTGRES_PASSWORD:-osu_stocks_dev}"
      ConnectionStrings__Redis: "redis:6379"
      OsuOAuth__ClientId: ${OSUOAUTH_CLIENT_ID}
      OsuOAuth__ClientSecret: ${OSUOAUTH_CLIENT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-osu-stocks}
      Jwt__Audience: ${JWT_AUDIENCE:-osu-stocks-client}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
