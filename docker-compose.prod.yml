# docker-compose.prod.yml — self-contained production stack for a single Hetzner CX33.
#
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Use this file STANDALONE (-f), not merged with the dev docker-compose.yml.
# Only Caddy publishes host ports (80/443) and terminates TLS; everything else
# (DB, Redis, app, Prometheus, exporters) lives on the internal network only.
name: osustocks

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: osu_stocks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: osu_stocks
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osu_stocks"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host ports: reachable only as "postgres" on the compose network.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=osu_stocks;Username=osu_stocks;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      OsuOAuth__ClientId: ${OSUOAUTH_CLIENT_ID:?}
      OsuOAuth__ClientSecret: ${OSUOAUTH_CLIENT_SECRET:?}
      OsuOAuth__RedirectUri: ${OSUOAUTH_REDIRECT_URI:?}
      Jwt__Issuer: ${JWT_ISSUER:-osu-stocks}
      Jwt__Audience: ${JWT_AUDIENCE:-osu-stocks-client}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?}
      Cors__AllowedOrigins__0: ${APP_ORIGIN:?}
      Security__OAuthReturnUrl__AllowedOrigins__0: ${APP_ORIGIN:?}
      Security__EnableSwagger: "false"
      # Push OpenTelemetry metrics to Prometheus' OTLP receiver (HTTP; .NET defaults to gRPC).
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://prometheus:9090/api/v1/otlp"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "osustocks-api"
    # The aspnet:9.0 runtime image ships no curl/wget, and /bin/sh (dash) lacks
    # /dev/tcp; invoke bash explicitly to GET /health and assert a 200 response.
    healthcheck:
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build:
      context: .
      dockerfile: src/Worker/Dockerfile
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=osu_stocks;Username=osu_stocks;Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379"
      OsuOAuth__ClientId: ${OSUOAUTH_CLIENT_ID:?}
      OsuOAuth__ClientSecret: ${OSUOAUTH_CLIENT_SECRET:?}
      Jwt__Issuer: ${JWT_ISSUER:-osu-stocks}
      Jwt__Audience: ${JWT_AUDIENCE:-osu-stocks-client}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://prometheus:9090/api/v1/otlp"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "osustocks-worker"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      api: { condition: service_healthy }

  web:
    # Builds the Next.js frontend from the sibling clone on the server
    # (git clone OsuStocks.Web next to OsuStocks.API).
    build:
      context: ../OsuStocks.Web
      args:
        # Browser API base: EMPTY so the client uses same-origin /api/v1/* (proxied
        # server-side). Must NOT be the public origin, or it becomes the proxy
        # fallback target and the /api/v1 rewrite loops back through Caddy.
        NEXT_PUBLIC_API_BASE_URL: ""
        NEXT_PUBLIC_SITE_URL: https://osustocks.com
        # Server-side proxy target — baked into the Next.js rewrite at build time.
        API_PROXY_TARGET: "http://api:8080"
        PORT: "3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Server-only proxy target for /api/v1/* — kept internal so API traffic stays on
      # the Docker network and the browser only ever talks to its own origin (no CORS).
      API_PROXY_TARGET: "http://api:8080"
    # node:20-alpine ships wget; probe the Next.js server on its own port.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api: { condition: service_healthy }

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_healthy }
      grafana: { condition: service_started }

  prometheus:
    image: prom/prometheus:v3.4.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-otlp-receiver"             # accept app metrics pushed via OTLP
      - "--storage.tsdb.retention.time=30d"      # keep RAM/disk modest on a CX33
      - "--storage.tsdb.retention.size=4GB"      # hard cap disk so the volume can't fill the host
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M

  grafana:
    image: grafana/grafana:11.6.1
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN:-osustocks.com}"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]

  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    command: ["--path.rootfs=/host"]
    pid: host
    volumes:
      - "/:/host:ro,rslave"

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://osu_stocks:${POSTGRES_PASSWORD}@postgres:5432/osu_stocks?sslmode=disable"
    depends_on: [postgres]

  redis-exporter:
    image: oliver006/redis_exporter:v1.74.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on: [redis]

  # Nightly pg_dump with rotation, into the postgres_backups volume. Image major
  # version must match postgres (16) so pg_dump is compatible. Restore example:
  #   gunzip -c /backups/last/osu_stocks-latest.sql.gz | psql -U osu_stocks -d osu_stocks
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: osu_stocks
      POSTGRES_USER: osu_stocks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      SCHEDULE: "@daily"            # nightly
      BACKUP_KEEP_DAYS: "7"
      BACKUP_KEEP_WEEKS: "4"
      BACKUP_KEEP_MONTHS: "6"
      POSTGRES_EXTRA_OPTS: "--clean --if-exists"
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres: { condition: service_healthy }

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
